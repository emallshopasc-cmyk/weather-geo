<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: #1a1a2e;
            color: #eee;
            padding: 20px;
        }

        .login-container {
            max-width: 400px;
            margin: 100px auto;
            background: #16213e;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .login-container h2 {
            margin-bottom: 25px;
            color: #667eea;
        }

        .login-container input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #0f3460;
            color: #eee;
            font-size: 1rem;
            margin-bottom: 15px;
        }

        .login-container button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .login-container button:hover { opacity: 0.9; }

        .dashboard { display: none; }
        .dashboard.visible { display: block; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header h1 {
            color: #667eea;
            font-size: 1.5rem;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn-sm {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 0.85rem;
            transition: opacity 0.2s;
        }

        .btn-danger { background: #e74c3c; color: white; }
        .btn-refresh { background: #667eea; color: white; }
        .btn-logout { background: #555; color: white; }
        .btn-sm:hover { opacity: 0.8; }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .stat-card .number {
            font-size: 2rem;
            font-weight: 700;
            color: #667eea;
        }

        .stat-card .label {
            color: #999;
            font-size: 0.85rem;
            margin-top: 5px;
        }

        .table-wrapper {
            overflow-x: auto;
            background: #16213e;
            border-radius: 12px;
            padding: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 700px;
        }

        th, td {
            padding: 12px 10px;
            text-align: left;
            border-bottom: 1px solid #2a2a4a;
            font-size: 0.85rem;
        }

        th {
            color: #667eea;
            font-weight: 600;
            white-space: nowrap;
        }

        td { color: #ccc; }

        tr:hover td { background: rgba(102, 126, 234, 0.05); }

        .btn-delete {
            background: #e74c3c;
            border: none;
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .btn-delete:hover { opacity: 0.8; }

        .no-data {
            text-align: center;
            color: #666;
            padding: 40px;
        }

        .map-link {
            color: #667eea;
            text-decoration: none;
        }

        .map-link:hover { text-decoration: underline; }

        .error-msg {
            color: #e74c3c;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .login-container { margin: 50px auto; padding: 25px; }
        }
    </style>
</head>
<body>
    <!-- Login -->
    <div class="login-container" id="loginSection">
        <h2>🔐 Admin Panel</h2>
        <input type="password" id="passwordInput" placeholder="Şifrəni daxil et..." onkeydown="if(event.key==='Enter') login()">
        <button onclick="login()">Daxil ol</button>
        <p class="error-msg" id="loginError"></p>
    </div>

    <!-- Dashboard -->
    <div class="dashboard" id="dashboard">
        <div class="header">
            <h1>📊 Ziyarətçi Paneli</h1>
            <div class="header-actions">
                <button class="btn-sm btn-refresh" onclick="loadVisitors()">🔄 Yenilə</button>
                <button class="btn-sm btn-danger" onclick="clearAll()">🗑️ Hamısını Sil</button>
                <button class="btn-sm btn-logout" onclick="logout()">🚪 Çıxış</button>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="number" id="totalVisitors">0</div>
                <div class="label">Ümumi Ziyarətçi</div>
            </div>
            <div class="stat-card">
                <div class="number" id="todayVisitors">0</div>
                <div class="label">Bu gün</div>
            </div>
            <div class="stat-card">
                <div class="number" id="uniqueIPs">0</div>
                <div class="label">Unikal IP</div>
            </div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Tarix</th>
                        <th>IP</th>
                        <th>Şəhər</th>
                        <th>Koordinat</th>
                        <th>Telefon/Cihaz</th>
                        <th>Provayder</th>
                        <th>Əməliyyat</th>
                    </tr>
                </thead>
                <tbody id="visitorTable">
                </tbody>
            </table>
            <p class="no-data" id="noData" style="display:none;">Hələ heç bir ziyarətçi yoxdur.</p>
        </div>
    </div>

    <script>
        let token = localStorage.getItem('admin_token') || '';

        // Əgər token varsa birbaşa dashboard göstər
        if (token) {
            showDashboard();
        }

        async function login() {
            const password = document.getElementById('passwordInput').value;
            if (!password) return;

            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                const data = await res.json();

                if (data.success) {
                    token = data.token;
                    localStorage.setItem('admin_token', token);
                    showDashboard();
                } else {
                    document.getElementById('loginError').textContent = 'Yanlış şifrə!';
                }
            } catch (e) {
                document.getElementById('loginError').textContent = 'Server xətası.';
            }
        }

        function showDashboard() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('dashboard').classList.add('visible');
            loadVisitors();
        }

        function logout() {
            token = '';
            localStorage.removeItem('admin_token');
            location.reload();
        }

        async function loadVisitors() {
            try {
                const res = await fetch('/api/admin/visitors', {
                    headers: { 'Authorization': token }
                });
                const data = await res.json();

                if (!data.success) {
                    logout();
                    return;
                }

                const visitors = data.visitors;
                document.getElementById('totalVisitors').textContent = visitors.length;

                // Bu günkü ziyarətçilər
                const today = new Date().toISOString().split('T')[0];
                const todayCount = visitors.filter(v => v.timestamp && v.timestamp.startsWith(today)).length;
                document.getElementById('todayVisitors').textContent = todayCount;

                // Unikal IP-lər
                const uniqueIps = new Set(visitors.map(v => v.ip)).size;
                document.getElementById('uniqueIPs').textContent = uniqueIps;

                // Cədvəl
                const tbody = document.getElementById('visitorTable');
                if (visitors.length === 0) {
                    tbody.innerHTML = '';
                    document.getElementById('noData').style.display = 'block';
                    return;
                }

                document.getElementById('noData').style.display = 'none';
                tbody.innerHTML = visitors.map((v, i) => `
                    <tr>
                        <td>${i + 1}</td>
                        <td>${formatDate(v.timestamp)}</td>
                        <td>${v.ip}</td>
                        <td>${v.city || '-'}</td>
                        <td>${v.lat && v.lon ? `<a class="map-link" href="https://www.google.com/maps?q=${v.lat},${v.lon}" target="_blank">${v.lat}, ${v.lon}</a>` : '-'}</td>
                        <td>${v.phoneModel || v.device || '-'}</td>
                        <td>${v.isp || '-'}</td>
                        <td><button class="btn-delete" onclick="deleteVisitor(${v.id})">Sil</button></td>
                    </tr>
                `).join('');
            } catch (e) {
                console.error(e);
            }
        }

        async function deleteVisitor(id) {
            if (!confirm('Bu qeydi silmək istəyirsiniz?')) return;
            await fetch(`/api/admin/visitors/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': token }
            });
            loadVisitors();
        }

        async function clearAll() {
            if (!confirm('BÜTÜN məlumatları silmək istəyirsiniz?')) return;
            await fetch('/api/admin/visitors', {
                method: 'DELETE',
                headers: { 'Authorization': token }
            });
            loadVisitors();
        }

        function formatDate(iso) {
            if (!iso) return '-';
            const d = new Date(iso);
            return d.toLocaleDateString('az-AZ') + ' ' + d.toLocaleTimeString('az-AZ', { hour: '2-digit', minute: '2-digit' });
        }
    </script>
</body>
</html>
